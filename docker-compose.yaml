services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    ports:
      - "6100:6100"
    depends_on:
      - relational_db

  frontend:
      build:
        context: ./frontend
        dockerfile: Dockerfile
      command: npm start
      restart: always
      env_file:
        - .env
      environment:
        - BACKEND_URL=http://backend:6100
      ports:
        - "3000:3000"

  chainlit:
      build:
        context: ./chainlit_app
        dockerfile: Dockerfile
      restart: always
      env_file:
        - .env
      ports:
        - "8000:8000"
      depends_on:
        - relational_db
  
  relational_db:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - db_volume:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  db_volume: